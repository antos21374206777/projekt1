<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Maszyna RAM</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Maszyna RAM</h1>

<div class="grid">

  <!-- PROCESOR -->
  <div class="panel">
    <h2>Procesor</h2>

    <div class="cpu-box">
      <div>
        <strong>Instruction:</strong>
        <span id="instr">-</span>
      </div>

      <div>
        <strong>Argument:</strong>
        <span id="arg">-</span>
      </div>
    </div>
  </div>

  <!-- PAMIĘĆ -->
  <div class="panel">
    <h2>Pamięć</h2>

    <table id="memory">
      <thead>
        <tr>
          <th>Address</th>
          <th>Value</th>
        </tr>
      </thead>

      <tbody></tbody>
    </table>
  </div>

  <!-- TAŚMY -->
  <div class="panel">
    <h2>Taśma wejścia</h2>

    <div class="tasma-wrapper">

  <div class="tasma">
    <div class="indeksy" id="inputIndexes"></div>
    <div class="pola" id="inputFields"></div>
  </div>

  <div class="tasma-controls">
    <button onclick="addInput()">+</button>
    <button onclick="removeInput()">-</button>
  </div>

</div>
  </div>
  <!-- PROGRAM -->
<div class="panel full">
  <h2>Program</h2>

  <table id="programTable">

    <thead>
      <tr>
        <th>LN</th>
        <th>Label (opis)</th>
        <th>Instruction</th>
        <th>Argument</th>
      </tr>
    </thead>

    <tbody id="programBody"></tbody>

  </table>
</div>
</div>
<!-- PRZYCISKI -->
<div class="controls">
  <button onclick="run()">Run</button>
  <button onclick="stepButton()">Step</button>
  <button onclick="reset()">Reset</button>
</div>
<div class="panel">
    <h2>Taśma wyjścia</h2>

    <div class="tasma-wrapper">

  <div class="tasma">
    <div class="indeksy" id="outputIndexes"></div>
    <div class="pola" id="outputFields"></div>
  </div>

  <div class="tasma-controls">
    <button onclick="addOutput()">+</button>
    <button onclick="removeOutput()">-</button>
  </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
